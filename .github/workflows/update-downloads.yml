# ────────────────────────────────────────────────────────────────────
# Kiosk — Update Download Links (downloads.json)
# ────────────────────────────────────────────────────────────────────
#
# This workflow runs whenever a new GitHub Release is published.
#
# It:
# 1. Fetches the latest release information
# 2. Extracts download URLs for each platform's artifacts
# 3. Generates/updates downloads.json with the URLs
# 4. Commits and pushes the updated file back to the repository
#
# The downloads.json file is used by the website to populate
# download buttons automatically without manual updates.
#
# Triggers:
# • When a GitHub Release is published
#
# ────────────────────────────────────────────────────────────────────

name: Update Download Links

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-downloads:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout repository so we can update downloads.json.
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Use GitHub API to map release assets -> website download links.
      - name: Generate downloads.json from release assets
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // Prefer the triggering release payload. Fallback to latest release.
            let release = context.payload.release;
            if (!release || !Array.isArray(release.assets)) {
              const latest = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              release = latest.data;
            }

            const assets = release.assets || [];

            function pick(predicate) {
              const match = assets.find(a => predicate(a.name || ''));
              return match ? match.browser_download_url : '';
            }

            const lower = (s) => s.toLowerCase();

            const downloads = {
              macos: pick((n) => {
                const x = lower(n);
                return x.endsWith('.dmg') && x.includes('kiosk-macos_');
              }),
              macos_intel: pick((n) => {
                const x = lower(n);
                return x.endsWith('.dmg') && x.includes('kiosk-macos-intel_');
              }),
              linux: pick((n) => {
                const x = lower(n);
                return x.includes('kiosk-linux_') && (x.endsWith('.appimage') || x.endsWith('.deb'));
              }),
              windows: pick((n) => {
                const x = lower(n);
                return x.includes('kiosk-windows_') && (x.endsWith('.msi') || x.endsWith('.exe'));
              }),
              android: pick((n) => {
                const x = lower(n);
                return x.includes('kiosk-android_') && x.endsWith('.apk');
              }),
            };

            fs.writeFileSync('downloads.json', JSON.stringify(downloads, null, 2) + '\n');
            core.info(`downloads.json generated for tag ${release.tag_name}`);

      # 3) Commit the updated file back to main.
      - name: Commit and push downloads.json
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- downloads.json; then
            echo "No changes to downloads.json"
          else
            git add downloads.json
            git commit -m "chore: update downloads.json for release ${{ github.event.release.tag_name }}"
            git push origin main
            echo "Updated downloads.json"
          fi

# ────────────────────────────────────────────────────────────────────
# Workflow Summary
# ────────────────────────────────────────────────────────────────────
#
# This workflow:
# 1. Runs whenever a new GitHub Release is published
# 2. Uses gh CLI to fetch the latest release info
# 3. Extracts download URLs for each platform's build artifacts
# 4. Generates a JSON file with version, platform names, and URLs
# 5. Commits the updated downloads.json back to main branch
#
# The downloads.json file is structured with platform-specific entries,
# including human-readable names, file names, download URLs, and formats.
#
# Website can import this JSON and auto-populate download buttons
# without needing manual updates.
#
# ────────────────────────────────────────────────────────────────────
