# ────────────────────────────────────────────────────────────────────
# Kiosk — Unified Cross-Platform Build
# ────────────────────────────────────────────────────────────────────
#
# Builds Kiosk for every supported platform in parallel:
#   • macOS Apple Silicon  (aarch64)
#   • macOS Intel          (x86_64)
#   • Linux                (Ubuntu 22.04)
#   • Windows              (x64)
#   • Android              (release APK)
#
# PDFium — the native PDF rendering library — is downloaded per
# platform and placed where the Tauri bundler / Rust linker expects it.
#
# ────────────────────────────────────────────────────────────────────

name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ═══════════════════════════════════════════════════════════════════
  #  Desktop builds (Tauri) — parallel matrix
  # ═══════════════════════════════════════════════════════════════════
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS Apple Silicon ────────────────────────────────────
          - platform: macos-latest
            os-name: macos
            rust-target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
            pdfium-platform: mac-arm64
            pdfium-lib: libpdfium.dylib

          # ── macOS Intel ────────────────────────────────────────────
          - platform: macos-latest
            os-name: macos-intel
            rust-target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
            pdfium-platform: mac-x64
            pdfium-lib: libpdfium.dylib

          # ── Linux ──────────────────────────────────────────────────
          - platform: ubuntu-22.04
            os-name: linux
            rust-target: x86_64-unknown-linux-gnu
            args: ""
            pdfium-platform: linux-x64
            pdfium-lib: libpdfium.so

          # ── Windows ────────────────────────────────────────────────
          - platform: windows-latest
            os-name: windows
            rust-target: x86_64-pc-windows-msvc
            args: ""
            pdfium-platform: win-x64
            pdfium-lib: pdfium.dll

    runs-on: ${{ matrix.platform }}

    defaults:
      run:
        working-directory: "Desktop (Tauri)/Kiosk"

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js 20 ─────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── 3. Rust toolchain ──────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      # ── 4. Rust cache (Swatinem/rust-cache) ────────────────────────
      # Platform-aware: each matrix entry gets its own cache bucket.
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "Desktop (Tauri)/Kiosk/src-tauri -> target"
          prefix-key: "v1-rust"
          shared-key: ${{ matrix.os-name }}

      # ── 5. Linux system dependencies ───────────────────────────────
      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf \
            file \
            wget

      # ── 6. Install npm dependencies ────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ────────────────────────────────────────────────────────────────
      #  PDFium Download — per platform
      # ────────────────────────────────────────────────────────────────
      # pdfium-render loads the native library at runtime.
      # Pre-built binaries: https://github.com/bblanchon/pdfium-binaries

      # ── 7a. PDFium — macOS ─────────────────────────────────────────
      # The Tauri macOS bundle config references /usr/local/lib/libpdfium.dylib
      # as a framework to embed. We download PDFium and place it there so the
      # bundler can find it and copy it into Contents/Frameworks/.
      - name: Download PDFium (macOS)
        if: runner.os == 'macOS'
        run: |
          URL="https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-${{ matrix.pdfium-platform }}.tgz"
          echo "Downloading $URL"
          curl -L -o /tmp/pdfium.tgz "$URL"
          mkdir -p /tmp/pdfium && tar -xzf /tmp/pdfium.tgz -C /tmp/pdfium
          DYLIB=$(find /tmp/pdfium -name "libpdfium.dylib" | head -1)
          if [ -z "$DYLIB" ]; then echo "ERROR: dylib not found"; find /tmp/pdfium; exit 1; fi
          sudo mkdir -p /usr/local/lib
          sudo cp "$DYLIB" /usr/local/lib/libpdfium.dylib
          echo "Installed $(ls -lh /usr/local/lib/libpdfium.dylib)"

      # ── 7b. PDFium — Linux ─────────────────────────────────────────
      # Place libpdfium.so next to Cargo.toml so the bundler can pick it up
      # as a resource (tauri.conf.json is patched in step 8).
      - name: Download PDFium (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          URL="https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-linux-x64.tgz"
          wget -q "$URL" -O /tmp/pdfium.tgz
          mkdir -p /tmp/pdfium && tar -xzf /tmp/pdfium.tgz -C /tmp/pdfium
          SO=$(find /tmp/pdfium -name "libpdfium.so" | head -1)
          if [ -z "$SO" ]; then echo "ERROR: .so not found"; find /tmp/pdfium; exit 1; fi
          cp "$SO" src-tauri/libpdfium.so
          echo "Installed $(ls -lh src-tauri/libpdfium.so)"

      # ── 7c. PDFium — Windows ───────────────────────────────────────
      # Place pdfium.dll next to Cargo.toml for resource bundling.
      - name: Download PDFium (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $url = "https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-win-x64.tgz"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\pdfium.tgz"
          New-Item -ItemType Directory -Force -Path "$env:TEMP\pdfium" | Out-Null
          tar -xzf "$env:TEMP\pdfium.tgz" -C "$env:TEMP\pdfium"
          $dll = Get-ChildItem -Path "$env:TEMP\pdfium" -Recurse -Filter "pdfium.dll" | Select-Object -First 1
          if (-not $dll) { Write-Error "pdfium.dll not found"; Get-ChildItem -Recurse "$env:TEMP\pdfium"; exit 1 }
          Copy-Item $dll.FullName -Destination "src-tauri\pdfium.dll" -Force
          Write-Host "Installed pdfium.dll — $([math]::Round((Get-Item 'src-tauri\pdfium.dll').Length / 1MB, 2)) MB"

      # ── 8. Patch tauri.conf.json for Linux ─────────────────────────
      # The checked-in config has macOS framework paths. On Linux we swap
      # the resources section to bundle libpdfium.so instead.
      - name: Patch tauri.conf.json for Linux
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          cd src-tauri
          python3 - <<'PY'
          import json, pathlib
          conf = pathlib.Path("tauri.conf.json")
          c = json.loads(conf.read_text())
          c["bundle"]["resources"] = {"libpdfium.so": "./"}
          conf.write_text(json.dumps(c, indent=2))
          print("Patched tauri.conf.json resources for Linux")
          PY

      # ── 9. Build Tauri app ─────────────────────────────────────────
      - name: Build Tauri app (${{ matrix.os-name }})
        run: npx tauri build ${{ matrix.args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      # ── 10. Debug — list bundle output ─────────────────────────────
      - name: List bundle output
        if: always()
        shell: bash
        run: |
          echo "=== Bundle files ==="
          find src-tauri/target -path '*/bundle/*' -type f 2>/dev/null | head -50 || echo "No bundle files"

      # ── 11. Upload artifact ────────────────────────────────────────
      - name: Upload artifact (kiosk-${{ matrix.os-name }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-${{ matrix.os-name }}
          path: |
            Desktop (Tauri)/Kiosk/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            Desktop (Tauri)/Kiosk/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            Desktop (Tauri)/Kiosk/src-tauri/target/release/bundle/appimage/*.AppImage
            Desktop (Tauri)/Kiosk/src-tauri/target/release/bundle/deb/*.deb
            Desktop (Tauri)/Kiosk/src-tauri/target/release/bundle/msi/*.msi
            Desktop (Tauri)/Kiosk/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════
  #  Android build
  # ═══════════════════════════════════════════════════════════════════
  build-android:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. JDK 17 + Gradle cache ──────────────────────────────────
      # actions/setup-java sets JAVA_HOME automatically.
      # Gradle picks it up — no org.gradle.java.home needed.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # ── 3. Build APK ──────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x Android/gradlew

      - name: Build Android release APK
        working-directory: Android
        run: ./gradlew assembleRelease

      # ── 4. Upload artifact ─────────────────────────────────────────
      - name: Upload artifact (kiosk-android)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-android
          path: Android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 7
