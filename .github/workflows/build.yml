# ────────────────────────────────────────────────────────────────────
# Kiosk — Unified Cross-Platform Build
# ────────────────────────────────────────────────────────────────────
#
# This workflow builds Kiosk for all supported platforms:
# • macOS (Apple Silicon + Intel)
# • Linux
# • Windows
# • Android
#
# Triggers:
# • Push to main branch
# • Manual dispatch (workflow_dispatch)
#
# Each platform builds as a separate job in the matrix to maximize
# parallelization and fault isolation. Artifacts are uploaded
# immediately after build success.
#
# ────────────────────────────────────────────────────────────────────

name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  # ════════════════════════════════════════════════════════════════════
  # Desktop Builds (Tauri) — macOS, Linux, Windows
  # ════════════════════════════════════════════════════════════════════

  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ─── macOS Apple Silicon ───────────────────────────────────
          - platform: macos-latest
            os-name: macos
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            
          # ─── macOS Intel ───────────────────────────────────────────
          - platform: macos-latest
            os-name: macos-intel
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin

          # ─── Linux (Ubuntu 22.04) ──────────────────────────────────
          - platform: ubuntu-22.04
            os-name: linux
            rust-target: x86_64-unknown-linux-gnu
            args: ""

          # ─── Windows ───────────────────────────────────────────────
          - platform: windows-latest
            os-name: windows
            rust-target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}
    
    defaults:
      run:
        working-directory: Desktop (Tauri)/Kiosk

    steps:
      # ─── 1. Checkout Code ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Install Node.js ────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ─── 3. Install Rust ──────────────────────────────────────────
      - name: Install Rust stable (${{ matrix.rust-target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      # ─── 4. Cache Cargo (Rust dependencies) ────────────────────────
      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            Desktop (Tauri)/Kiosk/src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ matrix.os-name }}-${{ hashFiles('Desktop (Tauri)/Kiosk/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.os-name }}-

      # ─── 5. Linux: Install system dependencies ────────────────────
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf \
            file

      # ─── 6. Install Frontend Dependencies (npm) ────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ─── 7. Build Tauri App (Tauricross-platform) ─────────────────
      - name: Build Tauri app (${{ matrix.os-name }})
        run: npm run tauri build -- ${{ matrix.args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      # ─── 8. Upload Desktop Artifact ────────────────────────────────
      - name: Upload artifact (${{ matrix.os-name }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-${{ matrix.os-name }}
          path: |
            Desktop (Tauri)/Kiosk/src-tauri/target/*/release/bundle/*
          if-no-files-found: warn
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════
  # Android Build
  # ════════════════════════════════════════════════════════════════════

  build-android:
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout Code ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Set up JDK 17 (Required by Android Gradle Plugin) ──────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      # ─── 3. Cache Gradle ───────────────────────────────────────────
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: android-gradle-${{ hashFiles('Android/**/*.gradle*', 'Android/**/gradle-wrapper.properties') }}
          restore-keys: android-gradle-

      # ─── 4. Make Gradle executable ─────────────────────────────────
      - name: Make Gradle wrapper executable
        run: chmod +x Android/gradlew

      # ─── 5. Build Android Release APK ──────────────────────────────
      - name: Build Android release APK (unsigned)
        working-directory: Android
        run: ./gradlew assembleRelease

      # ─── 6. Upload Android Artifact ────────────────────────────────
      - name: Upload Android APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-android
          path: Android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 7

# ────────────────────────────────────────────────────────────────────
# Workflow Summary
# ────────────────────────────────────────────────────────────────────
#
# This workflow:
# 1. Builds desktop apps (Tauri) for macOS, Linux, Windows in parallel
# 2. Builds Android APK separately
# 3. Uploads all artifacts for downstream workflows (release creation)
# 4. Uses matrix strategy for efficient parallel builds
# 5. Caches dependencies (Cargo, npm, Gradle) to reduce build time
#
# The artifacts are retained for 7 days and picked up by the
# release.yml workflow to create a GitHub Release.
#
# ────────────────────────────────────────────────────────────────────
