# ──────────────────────────────────────────────────────────────
# Kiosk — Unified Build (Desktop + Android) via GitHub Actions
# ──────────────────────────────────────────────────────────────
# Triggers:
#   • Push to alpha or main → builds all platforms simultaneously
#   • Git tag v*            → builds + creates a GitHub Release
#   • Manual dispatch       → workflow_dispatch from GitHub UI
#
# Jobs (all run in parallel):
#   build-desktop  — matrix: macOS arm64, macOS x64, Linux, Windows
#   build-android  — debug + release APKs
# ──────────────────────────────────────────────────────────────

name: Build Kiosk

on:
  push:
    branches:
      - alpha
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

# ── Desktop builds (Tauri) ──────────────────────────────────
jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS Apple Silicon ──
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-target: aarch64-apple-darwin
            pdfium-platform: mac-arm64
            artifact-name: kiosk-macos-aarch64

          # ── macOS Intel ──
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust-target: x86_64-apple-darwin
            pdfium-platform: mac-x64
            artifact-name: kiosk-macos-x86_64

          # ── Linux (Ubuntu 22.04 for broad glibc compat) ──
          - platform: ubuntu-22.04
            args: ''
            rust-target: ''
            pdfium-platform: linux-x64
            artifact-name: kiosk-linux-installers

          # ── Windows ──
          - platform: windows-latest
            args: ''
            rust-target: ''
            pdfium-platform: win-x64
            artifact-name: kiosk-windows-installers

    runs-on: ${{ matrix.platform }}

    defaults:
      run:
        working-directory: "Desktop (Tauri)/Kiosk"

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Linux system deps ───────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf \
            file \
            wget

      # ── 3. Rust toolchain ──────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Desktop (Tauri)/Kiosk/src-tauri/target
          key: ${{ matrix.artifact-name }}-cargo-${{ hashFiles('Desktop (Tauri)/Kiosk/src-tauri/Cargo.lock') }}
          restore-keys: ${{ matrix.artifact-name }}-cargo-

      # ── 4. Node / npm ──────────────────────────────────────
      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm ci

      # ── 5. PDFium download (per platform) ─────────────────
      # pdfium-render loads the native PDFium library at runtime.
      # Pre-built binaries: https://github.com/bblanchon/pdfium-binaries

      - name: Download PDFium (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          URL="https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-${{ matrix.pdfium-platform }}.tgz"
          echo "Downloading $URL"
          curl -L -o /tmp/pdfium.tgz "$URL"
          mkdir -p /tmp/pdfium
          tar -xzf /tmp/pdfium.tgz -C /tmp/pdfium
          DYLIB=$(find /tmp/pdfium -name "libpdfium.dylib" | head -1)
          if [ -z "$DYLIB" ]; then
            echo "ERROR: libpdfium.dylib not found in archive"
            find /tmp/pdfium
            exit 1
          fi
          sudo mkdir -p /usr/local/lib
          sudo cp "$DYLIB" /usr/local/lib/libpdfium.dylib
          echo "Installed: $(ls -lh /usr/local/lib/libpdfium.dylib)"

      - name: Download PDFium (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          URL="https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-linux-x64.tgz"
          wget -q "$URL" -O /tmp/pdfium.tgz
          mkdir -p /tmp/pdfium
          tar -xzf /tmp/pdfium.tgz -C /tmp/pdfium
          SO=$(find /tmp/pdfium -name "libpdfium.so" | head -1)
          if [ -z "$SO" ]; then
            echo "ERROR: libpdfium.so not found in archive"
            find /tmp/pdfium
            exit 1
          fi
          cp "$SO" src-tauri/libpdfium.so
          echo "Installed: $(ls -lh src-tauri/libpdfium.so)"

      - name: Download PDFium (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $url = "https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-win-x64.tgz"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\pdfium.tgz"
          New-Item -ItemType Directory -Force -Path "$env:TEMP\pdfium" | Out-Null
          tar -xzf "$env:TEMP\pdfium.tgz" -C "$env:TEMP\pdfium"
          $dll = Get-ChildItem -Path "$env:TEMP\pdfium" -Recurse -Filter "pdfium.dll" | Select-Object -First 1
          if (-not $dll) {
            Write-Error "pdfium.dll not found in archive"
            Get-ChildItem -Recurse "$env:TEMP\pdfium" | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }
          Copy-Item $dll.FullName -Destination "src-tauri\pdfium.dll" -Force
          Write-Host "Installed pdfium.dll — $([math]::Round((Get-Item 'src-tauri\pdfium.dll').Length / 1MB, 2)) MB"

      # ── 6. Patch tauri.conf.json for Linux ─────────────────
      # The config ships with pdfium.dll in resources (Windows default);
      # swap it for libpdfium.so on Linux.
      - name: Patch tauri.conf.json resources for Linux
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          cd src-tauri
          python3 - <<'PY'
          import json
          with open("tauri.conf.json") as f:
              c = json.load(f)
          c["bundle"]["resources"] = {"libpdfium.so": "./"}
          with open("tauri.conf.json", "w") as f:
              json.dump(c, f, indent=2)
          print("Patched tauri.conf.json resources for Linux")
          PY

      # ── 7. Build Tauri ─────────────────────────────────────
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: Desktop (Tauri)/Kiosk
          args: ${{ matrix.args }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: 'Kiosk ${{ github.ref_name }}'
          releaseBody: 'Official release'
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

      # ── 8. Debug output ────────────────────────────────────
      - name: Debug — list bundle output
        if: always()
        shell: bash
        run: |
          echo "=== Bundle files ==="
          find src-tauri/target -path '*/bundle/*' -type f 2>/dev/null | head -50 || echo "No bundle files found"

      # ── 9. Upload artifacts ────────────────────────────────

      - name: Upload macOS aarch64 DMG
        if: always() && matrix.platform == 'macos-latest' && contains(matrix.args, 'aarch64')
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-macos-aarch64
          path: Desktop (Tauri)/Kiosk/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload macOS x86_64 DMG
        if: always() && matrix.platform == 'macos-latest' && contains(matrix.args, 'x86_64')
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-macos-x86_64
          path: Desktop (Tauri)/Kiosk/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload Linux packages
        if: always() && matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-linux-installers
          path: |
            Desktop (Tauri)/Kiosk/src-tauri/target/release/bundle/appimage/*.AppImage
            Desktop (Tauri)/Kiosk/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

      - name: Upload Windows installers
        if: always() && matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-windows-installers
          path: |
            Desktop (Tauri)/Kiosk/src-tauri/target/release/bundle/msi/*.msi
            Desktop (Tauri)/Kiosk/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      # ── 10. Debug — list bundle output (tauri-action) ──────
      # tauri-action handles GitHub Release creation on tag push.


# ── Android build ───────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. JDK 17 (required by AGP 8.x) ───────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Gradle cache ────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: android-gradle-${{ hashFiles('Android/**/*.gradle*', 'Android/**/gradle-wrapper.properties') }}
          restore-keys: android-gradle-

      # ── 4. Build ───────────────────────────────────────────
      - name: Make Gradle wrapper executable
        run: chmod +x Android/gradlew

      - name: Build Android debug APK
        working-directory: Android
        run: ./gradlew assembleDebug

      - name: Build Android release APK (unsigned)
        working-directory: Android
        run: ./gradlew assembleRelease

      # ── 5. Upload ──────────────────────────────────────────
      - name: Upload Android APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-android-apks
          path: |
            Android/app/build/outputs/apk/debug/*.apk
            Android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      # ── 6. GitHub Release (only on version tag) ────────────
      - name: Create GitHub Release (Android)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Android/app/build/outputs/apk/debug/*.apk
            Android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
