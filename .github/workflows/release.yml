# ────────────────────────────────────────────────────────────────────
# Kiosk — Automatic Release Creation
# ────────────────────────────────────────────────────────────────────
#
# This workflow runs after the build workflow completes successfully.
#
# It:
# 1. Downloads all build artifacts
# 2. Detects which artifacts exist (which OSes were built)
# 3. Generates a compatibility suffix (m, m64, l, w, a)
# 4. Creates a git tag dynamically (e.g., v1.5.2-mlw)
# 5. Creates a GitHub Release with all artifacts as assets
#
# Triggers:
# • After build.yml completes on main branch
#
# ────────────────────────────────────────────────────────────────────

name: Release

on:
  workflow_run:
    workflows: [Build]
    branches: [main]
    types: [completed]

permissions:
  contents: write
  actions: read

env:
  # Increment this when releasing a new version
  APP_VERSION: "1.5.2"

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout Code ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Download All Artifacts ─────────────────────────────────
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          run-id: ${{ github.event.workflow_run.id }}

      # ─── 3. Detect Available Artifacts & Build Compatibility Tag ────
      - name: Detect artifacts and build compatibility tag
        id: detect
        run: |
          cd artifacts
          
          # Initialize compatibility flags
          COMPAT_TAG=""
          ARTIFACT_FILES=""
          
          # Check for each artifact type
          if [ -d "kiosk-macos" ] && [ "$(ls -A kiosk-macos/ 2>/dev/null)" ]; then
            COMPAT_TAG="${COMPAT_TAG}m"
            ARTIFACT_FILES="${ARTIFACT_FILES} artifacts/kiosk-macos/*"
            echo "✓ macOS (Apple Silicon) detected"
          fi
          
          if [ -d "kiosk-macos-intel" ] && [ "$(ls -A kiosk-macos-intel/ 2>/dev/null)" ]; then
            COMPAT_TAG="${COMPAT_TAG}m64"
            ARTIFACT_FILES="${ARTIFACT_FILES} artifacts/kiosk-macos-intel/*"
            echo "✓ macOS (Intel) detected"
          fi
          
          if [ -d "kiosk-linux" ] && [ "$(ls -A kiosk-linux/ 2>/dev/null)" ]; then
            COMPAT_TAG="${COMPAT_TAG}l"
            ARTIFACT_FILES="${ARTIFACT_FILES} artifacts/kiosk-linux/*"
            echo "✓ Linux detected"
          fi
          
          if [ -d "kiosk-windows" ] && [ "$(ls -A kiosk-windows/ 2>/dev/null)" ]; then
            COMPAT_TAG="${COMPAT_TAG}w"
            ARTIFACT_FILES="${ARTIFACT_FILES} artifacts/kiosk-windows/*"
            echo "✓ Windows detected"
          fi
          
          if [ -d "kiosk-android" ] && [ "$(ls -A kiosk-android/ 2>/dev/null)" ]; then
            COMPAT_TAG="${COMPAT_TAG}a"
            ARTIFACT_FILES="${ARTIFACT_FILES} artifacts/kiosk-android/*"
            echo "✓ Android detected"
          fi
          
          # Construct the git tag
          TAG="v${APP_VERSION}-${COMPAT_TAG}"
          RELEASE_NAME="Kiosk v${APP_VERSION}"
          
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "release_name=${RELEASE_NAME}" >> $GITHUB_OUTPUT
          echo "artifact_files=${ARTIFACT_FILES}" >> $GITHUB_OUTPUT
          echo ""
          echo "Tag: ${TAG}"
          echo "Release: ${RELEASE_NAME}"

      # ─── 4. Create Git Tag ─────────────────────────────────────────
      - name: Create git tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.detect.outputs.tag }}
          git push origin ${{ steps.detect.outputs.tag }}

      # ─── 5. Flatten and Prepare Assets ────────────────────────────
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          
          # Copy and flatten all artifacts
          if [ -d "artifacts/kiosk-macos" ]; then
            find artifacts/kiosk-macos -type f \( -name "*.dmg" -o -name "*.app" -o -name "*.tar.gz" \) \
              -exec cp {} release-assets/ \;
          fi
          
          if [ -d "artifacts/kiosk-macos-intel" ]; then
            find artifacts/kiosk-macos-intel -type f \( -name "*.dmg" -o -name "*.app" -o -name "*.tar.gz" \) \
              -exec cp {} release-assets/ \;
          fi
          
          if [ -d "artifacts/kiosk-linux" ]; then
            find artifacts/kiosk-linux -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) \
              -exec cp {} release-assets/ \;
          fi
          
          if [ -d "artifacts/kiosk-windows" ]; then
            find artifacts/kiosk-windows -type f \( -name "*.msi" -o -name "*.exe" \) \
              -exec cp {} release-assets/ \;
          fi
          
          if [ -d "artifacts/kiosk-android" ]; then
            find artifacts/kiosk-android -type f -name "*.apk" \
              -exec cp {} release-assets/ \;
          fi
          
          echo "=== Release Assets ==="
          ls -lh release-assets/

      # ─── 6. Create GitHub Release ──────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.detect.outputs.tag }}
          name: ${{ steps.detect.outputs.release_name }}
          body: |
            ## Kiosk ${{ env.APP_VERSION }}
            
            Automated release with support for:
            - macOS (Apple Silicon & Intel)
            - Linux
            - Windows
            - Android
            
            **Download the appropriate version for your platform below.**
            
            Built with ❤️ using Tauri & Rust
          files: release-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ────────────────────────────────────────────────────────────────────
# Workflow Summary
# ────────────────────────────────────────────────────────────────────
#
# This workflow:
# 1. Runs after build.yml completes successfully
# 2. Downloads all artifacts from the build job
# 3. Scans for available platform artifacts
# 4. Generates a compatibility tag (v1.5.2-mlw means macOS, Linux, Windows)
# 5. Creates a git tag and pushes it
# 6. Flattens artifacts (removes nested bundle directories)
# 7. Creates a GitHub Release with all artifacts as downloadable assets
#
# The release picks up the version from APP_VERSION env var.
# To bump the version, update APP_VERSION and commit/push.
#
# ────────────────────────────────────────────────────────────────────
