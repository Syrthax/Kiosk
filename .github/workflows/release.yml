# ────────────────────────────────────────────────────────────────────
# Kiosk — Automatic Release Creation
# ────────────────────────────────────────────────────────────────────
#
# This workflow runs after the build workflow completes successfully.
#
# It:
# 1. Downloads all build artifacts
# 2. Detects which artifacts exist (which OSes were built)
# 3. Generates a compatibility suffix (m, m64, l, w, a)
# 4. Creates a git tag dynamically (e.g., v1.5.2-mlw)
# 5. Creates a GitHub Release with all artifacts as assets
#
# Triggers:
# • After build.yml completes on main branch
#
# ────────────────────────────────────────────────────────────────────

name: Release

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]

permissions:
  contents: write
  actions: read

env:
  APP_VERSION: "1.5.2"

jobs:
  release:
    # Only publish when the upstream Build workflow succeeded.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout repository for tag operations.
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Download all artifacts from the completed Build run.
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
          path: artifacts

      # 3) Detect which platform artifacts exist and compute release tag.
      - name: Compute compatibility suffix and release metadata
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          suffix=""
          [[ -d artifacts/kiosk-macos && "$(find artifacts/kiosk-macos -type f | head -1)" ]] && suffix+="m"
          [[ -d artifacts/kiosk-macos-intel && "$(find artifacts/kiosk-macos-intel -type f | head -1)" ]] && suffix+="m64"
          [[ -d artifacts/kiosk-linux && "$(find artifacts/kiosk-linux -type f | head -1)" ]] && suffix+="l"
          [[ -d artifacts/kiosk-windows && "$(find artifacts/kiosk-windows -type f | head -1)" ]] && suffix+="w"
          [[ -d artifacts/kiosk-android && "$(find artifacts/kiosk-android -type f | head -1)" ]] && suffix+="a"

          if [[ -z "$suffix" ]]; then
            echo "No release artifacts found; aborting."
            exit 1
          fi

          tag="v${APP_VERSION}-${suffix}"
          title="Kiosk v${APP_VERSION}"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"
          echo "suffix=$suffix" >> "$GITHUB_OUTPUT"

          echo "Release tag: $tag"

      # 4) Flatten artifacts into a single upload folder.
      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          while IFS= read -r file; do
            rel="${file#artifacts/}"
            artifact="${rel%%/*}"
            base="$(basename "$file")"
            cp "$file" "release-assets/${artifact}_${base}"
          done < <(find artifacts -type f \( -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.msi" -o -name "*.exe" -o -name "*.apk" \))

          count="$(find release-assets -type f | wc -l | tr -d ' ')"
          if [[ "$count" == "0" ]]; then
            echo "No release assets collected; aborting."
            exit 1
          fi

          echo "Collected $count release assets"
          ls -lah release-assets

      # 5) Create/push the git tag if it does not already exist.
      - name: Ensure release tag exists
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.detect.outputs.tag }}"
          git fetch --tags --force

          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "Tag $tag already exists; reusing existing tag."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$tag"
            git push origin "$tag"
          fi

      # 6) Publish release and attach all artifacts.
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.detect.outputs.tag }}
          name: ${{ steps.detect.outputs.title }}
          body: |
            Automated release for Kiosk ${{ env.APP_VERSION }}.

            Compatibility suffix: `${{ steps.detect.outputs.suffix }}`
            - m: macOS ARM
            - m64: macOS Intel
            - l: Linux
            - w: Windows
            - a: Android
          files: release-assets/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ────────────────────────────────────────────────────────────────────
# Workflow Summary
# ────────────────────────────────────────────────────────────────────
#
# This workflow:
# 1. Runs after build.yml completes successfully
# 2. Downloads all artifacts from the build job
# 3. Scans for available platform artifacts
# 4. Generates a compatibility tag (v1.5.2-mlw means macOS, Linux, Windows)
# 5. Creates a git tag and pushes it
# 6. Flattens artifacts (removes nested bundle directories)
# 7. Creates a GitHub Release with all artifacts as downloadable assets
#
# The release picks up the version from APP_VERSION env var.
# To bump the version, update APP_VERSION and commit/push.
#
# ────────────────────────────────────────────────────────────────────
